<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c0618">
  <title>💖 Nuestro Álbum de Amor</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="cinema-bg" aria-hidden="true">
    <div class="layer-sky"></div>
    <div class="layer-horizon"></div>
    <div class="layer-clouds"></div>
  </div>

  <div id="sparkles-layer" aria-hidden="true"></div>
  <div id="hearts-layer" aria-hidden="true"></div>
  <div id="petals-layer" aria-hidden="true"></div>
  <div id="tulips-layer" aria-hidden="true"></div>
  <div class="layer-vignette" aria-hidden="true"></div>
  <div class="layer-grain" aria-hidden="true"></div>

  <!-- PANTALLA DE ACCESO -->
  <section id="pantalla-acceso">
    <h1 class="acceso-title">Nuestro Álbum<br>de Amor</h1>
    <p class="acceso-deco">· · · ♥ · · ·</p>
    <div class="acceso-card">
      <p id="titulo-acceso"></p>
      <input type="text" id="input-fecha" placeholder="DD/MM/AAAA" maxlength="10" inputmode="numeric" autocomplete="off">
      <button id="btn-entrar">Entrar al álbum ♥</button>
      <p id="msg-acceso" class="msg"></p>
    </div>
    <p class="acceso-footer"><span id="acceso-foot"></span></p>
  </section>

  <!-- ÁLBUM -->
  <main id="album-principal">
    <header class="album-header">
      <h1 id="album-titulo"></h1>
      <p id="album-subtitulo"></p>
    </header>
    <section id="cuerdas-section" aria-label="Galería de recuerdos"></section>
    <footer class="album-footer"><p>Hecho con amor para ti 💕</p></footer>
  </main>

  <!-- OVERLAY -->
  <div id="modal-overlay" aria-hidden="true"></div>

  <!-- MODAL 2 COLUMNAS -->
  <article id="modal" role="dialog" aria-modal="true">
    <button id="btn-close" aria-label="Cerrar">✕</button>
    <div class="m-grid">
      <!-- COL IZQUIERDA: texto -->
      <div class="m-col-left">
        <h2 id="m-titulo"></h2>
        <div class="m-divider">
          <span class="m-div-line"></span>
          <span class="m-div-heart">♥</span>
          <span class="m-div-line"></span>
        </div>
        <div class="m-text-area">
          <p id="m-texto"></p>
        </div>
        <div class="m-actions">
          <button class="m-btn m-btn-ghost" id="btn-volver">↑ Volver al inicio</button>
          <button class="m-btn m-btn-primary" id="btn-cerrar">Cerrar recuerdo</button>
        </div>
      </div>
      <!-- COL DERECHA: foto + controles -->
      <div class="m-col-right">
        <div class="m-img-wrap">
          <img id="m-img" src="" alt="Recuerdo">
          <div class="m-audio-ctrls">
            <button class="m-ctrl" id="btn-pause" aria-label="Pausar">⏸</button>
          </div>
        </div>
        <div class="m-eq-row">
          <span class="eq-b"></span><span class="eq-b"></span><span class="eq-b"></span><span class="eq-b"></span><span class="eq-b"></span>
          <span class="eq-lbl">reproduciendo…</span>
        </div>
        <div class="m-vol">
          <span class="m-vol-icon">🔈</span>
          <input type="range" id="vol-range" min="0" max="1" step="0.05" value="0.45">
          <span class="m-vol-icon">🔊</span>
        </div>
      </div>
    </div>
  </article>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
